<!DOCTYPE html>
<html>
<head>
    <title>Flyers Inventory Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        body {
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(180, 170, 255, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 220, 180, 0.20), transparent 35%),
        linear-gradient(rgba(245, 247, 250, 0.9), rgba(245, 247, 250, 0.9)),
        url("/static/logo1.jpg");
    background-size: auto, auto, auto, 420px;
    background-repeat: no-repeat, no-repeat, repeat, repeat;
    background-position: top left, bottom right, center, center;
    background-attachment: fixed;
}

.page-wrap {
    min-height: 100vh;
    padding: 50px 20px;
}

.glass-card {
    width: 100%;
    max-width: 900px;
    padding: 48px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.85);
    box-shadow: 0 20px 50px rgba(20, 20, 40, 0.08);
}

.section-title {
    font-weight: 800;
    font-size: 26px;
    margin-bottom: 30px;
    color: #15151f;
}

.flyer-container {
    display: flex;
    justify-content: center;
    gap: 22px;
    flex-wrap: wrap;
}

.flyer-card {
    width: 220px;
    min-height: 145px;
    padding: 24px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: #111;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(220, 220, 235, 0.9);
    box-shadow: 0 12px 28px rgba(20, 20, 40, 0.07);
    transition: all 0.28s ease;
    position: relative;
    overflow: hidden;
}

.flyer-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 45px rgba(20, 20, 40, 0.14);
    border-color: rgba(185, 180, 255, 0.9);
}

.flyer-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(210, 205, 255, 0.25), rgba(255, 255, 255, 0));
    opacity: 0;
    transition: opacity 0.28s ease;
}

.flyer-card:hover::before {
    opacity: 1;
}

.icon-box {
    width: 38px;
    height: 38px;
    margin: 0 auto 14px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0edff, #ffffff);
    color: #7a6ff0;
    font-size: 18px;
}

.flyer-title,
.flyer-sub {
    position: relative;
    z-index: 1;
}

.flyer-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 8px;
}

.flyer-sub {
    font-size: 13px;
    color: #5d6475;
}
.card div {
    margin-bottom: 4px;
}
.flyer-card,
.flyer-btn {
    position: relative;
    overflow: hidden;
}



    </style>
</head>


<body>
<div class="page-wrap">
<div class="container">

    <h1 class="mb-4 fw-bold text-center">📊 Flyers Inventory Dashboard</h1>

    <div class="glass-card text-center mx-auto mb-4">
        <h4 class="section-title">Select Flyer Type</h4>

        <div class="flyer-container">
            {% for f in flyers %}
            <a href="/flyer/{{ f[0] }}" class="flyer-card">
                <div class="icon-box">✦</div>
                <div class="flyer-title">{{ f[1] }}</div>
                <div class="flyer-sub">View Details →</div>
            </a>
            {% endfor %}
        </div>
    </div>

    <div class="glass-card text-center mx-auto">
        <h4 class="section-title">Select Function</h4>

        <div class="flyer-container">
            <a href="/add-stock-page" class="flyer-card">
                <div class="icon-box">＋</div>
                <div class="flyer-title">Add Stock per Branch</div>
                <div class="flyer-sub">Manage stock →</div>
            </a>

            <a href="/add-distribution-page" class="flyer-card">
                <div class="icon-box">↗</div>
                <div class="flyer-title">Add Distribution</div>
                <div class="flyer-sub">Record release →</div>
            </a>

            <a href="/filter-summary-page" class="flyer-card">
                <div class="icon-box">⌕</div>
                <div class="flyer-title">Filter Summary</div>
                <div class="flyer-sub">Search records →</div>
            </a>

            <a href="/summary-page" class="flyer-card">
                <div class="icon-box">▦</div>
                <div class="flyer-title">Summary</div>
                <div class="flyer-sub">View all records →</div>
            </a>
        </div>
    </div>

</div>
</div>
</body>
  
<script>
function selectFlyer(flyerId, button) {
    document.getElementById('flyer').value = flyerId;

    document.querySelectorAll('.flyer-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    button.classList.add('active');
    updateRemaining();
}

function updateRemaining() {
    const branch = document.getElementById('branch').value;
    const flyer = document.getElementById('flyer').value;
    const display = document.getElementById('remaining-display');

    if (branch && flyer) {
        fetch(`/get_remaining?branch_id=${branch}&flyer_id=${flyer}`)
            .then(res => res.json())
            .then(data => {
                display.textContent = `Remaining: ${data.remaining}`;
            });
    } else {
        display.textContent = 'Remaining: 0';
    }
}

document.getElementById('branch').addEventListener('change', updateRemaining);
</script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function(){
    $('.select2').select2();
});
</script>

</body>
</html>

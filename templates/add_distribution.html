

    <!DOCTYPE html>
<html>
<head>
    <title>Flyers Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(180, 170, 255, 0.18), transparent 35%),
                radial-gradient(circle at bottom right, rgba(255, 220, 180, 0.20), transparent 35%),
                linear-gradient(rgba(245, 247, 250, 0.90), rgba(245, 247, 250, 0.90)),
                url("/static/logo1.jpg");
            background-size: auto, auto, auto, 420px;
            background-repeat: no-repeat, no-repeat, repeat, repeat;
            background-position: top left, bottom right, center, center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .page-wrap {
            min-height: 100vh;
            padding: 50px 20px;
        }

        .glass-card {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 20px 50px rgba(20, 20, 40, 0.08);
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: #15151f;
            margin-bottom: 25px;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 11px 14px;
        }

        .btn {
            border-radius: 12px;
            padding: 11px 18px;
            font-weight: 600;
        }

        .back-btn {
            margin-bottom: 20px;
        }
        .flyer-btn {
    border: 1px solid #d7dbe7;
    background: #fff;
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.2s ease;
}

.flyer-btn:hover,
.flyer-btn.active {
    background: #0d6efd;
    color: white;
    border-color: #0d6efd;
}
    </style>
</head>

<body>
<div class="page-wrap">
    <div class="glass-card">

        <a href="/" class="btn btn-secondary back-btn">← Back to Dashboard</a>
 <div class="card p-4 mb-4">
        <h4>Add Distribution</h4>
        <form action="/add" method="POST" class="row g-3">
            <div class="col-md-4">
                <label>Branch</label>
                <select name="branch" id="branch" class="form-control select2" required>
                    <option value="">Select branch</option>
                    {% for b in branches %}
                    <option value="{{ b[0] }}">{{ b[1] }}</option>
                    {% endfor %}
                </select>
                <span id="remaining-display" class="remaining-badge text-info">Remaining: 0</span>
            </div>

            <div class="col-md-8">
    <label>Choose Flyer</label>

    <div class="flyer-options mt-2">
        {% for f in flyers %}
        <button type="button" class="flyer-btn" onclick="selectFlyer('{{ f[0] }}', this)">
            {{ f[1] }}
        </button>
        {% endfor %}
    </div>

    <input type="hidden" name="flyer" id="flyer" required>
</div>

                <input type="hidden" name="flyer" id="flyer" required>
            </div>

            <div class="col-md-3">
                <label>Quantity</label>
                <input type="number" name="quantity" class="form-control" min="1" required>
            </div>

            <div class="col-md-2">
                <label>Month</label>
                <select name="month" class="form-control">
                    {% for m in range(1,13) %}
                    <option value="{{ m }}">{{ m }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-2">
                <label>Year</label>
                <input type="number" name="year" class="form-control" value="{{ request.args.get('year', 2026) }}" min="2000" max="2100">
            </div>

            <div class="col-md-5 d-flex align-items-end">
                <button class="btn btn-primary w-100">Add Distribution</button>
            </div>
        </form>
    </div>

    </div>
</div>
<script>
function selectFlyer(flyerId, button) {
    document.getElementById('flyer').value = flyerId;

    document.querySelectorAll('.flyer-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    button.classList.add('active');

    updateRemaining();
}

function updateRemaining() {
    const branch = document.getElementById('branch').value;
    const flyer = document.getElementById('flyer').value;
    const display = document.getElementById('remaining-display');

    if (branch && flyer) {
        fetch(`/get_remaining?branch_id=${branch}&flyer_id=${flyer}`)
            .then(res => res.json())
            .then(data => {
                display.textContent = `Remaining: ${data.remaining}`;
            });
    } else {
        display.textContent = 'Remaining: 0';
    }
}

document.getElementById('branch').addEventListener('change', updateRemaining);
</script>
</body>
</html>
